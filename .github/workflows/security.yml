# .github/workflows/security.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push and pull request to main.
# Blocks merging if any security check fails.
# ─────────────────────────────────────────────────────────────────────────────

name: Security & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r antigravity/requirements.txt

      # ── Step 1: Bandit — static security analysis ─────────────────────────
      - name: Run Bandit (security linting)
        run: |
          pip install bandit
          bandit -r antigravity/ -ll --exclude antigravity/apps/*/migrations
        # -ll = flag medium severity and above

      # ── Step 2: Secret scanning ───────────────────────────────────────────
      - name: Scan for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan antigravity/ --exclude-files ".*\.pyc$"

      # ── Step 3: Django system check ───────────────────────────────────────
      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-key-not-a-real-secret
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd antigravity
          python manage.py check

      # ── Step 4: Run tests ─────────────────────────────────────────────────
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-key-not-a-real-secret
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost
        run: |
          cd antigravity
          python manage.py test --verbosity=2
