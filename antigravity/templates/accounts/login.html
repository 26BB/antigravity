{% extends "base.html" %}

{% block title %}Log In — AntiGravity{% endblock %}
{% block meta_description %}Sign in to your AntiGravity account securely.{% endblock %}

{% block content %}
<h1>Log In</h1>

<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
</form>

<p>Don't have an account? <a href="{% url 'accounts:register' %}">Register</a></p>
<p><a href="{% url 'accounts:password-reset' %}">Forgot your password?</a></p>
{% endblock %}
