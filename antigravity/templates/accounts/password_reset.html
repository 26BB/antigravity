{% extends "base.html" %}

{% block title %}Reset Password — AntiGravity{% endblock %}

{% block content %}
<h1>Reset Your Password</h1>

<form method="post" action="{% url 'accounts:password-reset' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send Reset Link</button>
</form>

<a href="{% url 'accounts:login' %}">← Back to login</a>
{% endblock %}
